<div class="dashboard-container">
  <section class="kpi-grid">
    <mat-card class="kpi-card">
      <mat-card-header>
        <mat-card-title>Total venta</mat-card-title>
      </mat-card-header>
      <mat-card-content>
        <p class="big-number">{{ totalRevenue | currency: 'MXN' : 'symbol' : '1.2-2' }}</p>
      </mat-card-content>
    </mat-card>
    <mat-card class="kpi-card">
      <mat-card-header>
        <mat-card-title> Productos </mat-card-title>
      </mat-card-header>
      <mat-card-content>
        <p class="big-number">{{ products.length }}</p>
      </mat-card-content>
    </mat-card>
  </section>

  <mat-card class="table-card">
    <mat-card-header>
      <mat-card-title> Ventas recientes </mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <table mat-table [dataSource]="sales.slice(0, 5)">
        <ng-container matColumnDef="folio">
          <th mat-header-cell *matHeaderCellDef>Folio</th>
          <td mat-cell *matCellDef="let sale">{{ sale.folio }}</td>
        </ng-container>
        <ng-container matColumnDef="date">
          <th mat-header-cell *matHeaderCellDef>Fecha</th>
          <td mat-cell *matCellDef="let sale">{{ sale.date | date: 'shortDate' }}</td>
        </ng-container>
        <<ng-container matColumnDef="amount">
          <th mat-header-cell *matHeaderCellDef>Monto</th>
          <td mat-cell *matCellDef="let sale">{{ sale.total | currency }}</td>
        </ng-container>
        <tr mat-header-row *matHeaderRowDef="['folio', 'date', 'amount']"></tr>
        <tr mat-row *matRowDef="let row; columns: ['folio', 'date', 'amount']"></tr>
      </table>
    </mat-card-content>
    <mat-card-actions>
      <button mat-button color="primary" routerLink="/sales">VER TODAS</button>
    </mat-card-actions>
  </mat-card>
</div>
